services:
  influxdb:
    image: influxdb:2.7
    container_name: puda-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: puda
      DOCKER_INFLUXDB_INIT_BUCKET: machines
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: puda-admin-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.5.0
    container_name: puda-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning
      - ./dashboards:/var/lib/grafana/dashboards
    depends_on:
      influxdb:
        condition: service_healthy

  watcher:
    build: .
    container_name: puda-watcher
    restart: unless-stopped
    network_mode: host
    environment:
      INFLUXDB_URL: http://localhost:8086
      INFLUXDB_TOKEN: puda-admin-token
      INFLUXDB_ORG: puda
      INFLUXDB_BUCKET: machines
      NATS_SERVERS: nats://100.109.131.12:4222,nats://100.109.131.12:4223,nats://100.109.131.12:4224
      MACHINES: biologic,first,opentrons
    depends_on:
      influxdb:
        condition: service_healthy

volumes:
  influxdb_data:
  grafana_data:
