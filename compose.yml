services:
  influxdb:
    image: influxdb:3.9.2-core
    container_name: puda-influxdb
    restart: unless-stopped
    ports:
      - "8181:8181"
    environment:
      INFLUXDB3_NODE_IDENTIFIER_PREFIX: puda
      INFLUXDB3_LOG_FILTER: info
      INFLUXDB3_ADMIN_TOKEN_FILE: /run/secrets/admin-token
    volumes:
      - influxdb_data:/home/influxdb3/.influxdb
      - ./admin-token.json:/run/secrets/admin-token:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Authorization: Bearer apiv3_puda", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:13.0.1
    container_name: puda-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning
      - ./dashboards:/var/lib/grafana/dashboards
    depends_on:
      influxdb:
        condition: service_healthy

  telegraf:
    image: telegraf:1.33
    container_name: puda-telegraf
    restart: unless-stopped
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
    environment:
      HOST_PROC: /host/proc
      HOST_SYS: /host/sys
      HOST_ETC: /host/etc
    depends_on:
      influxdb:
        condition: service_healthy

  watcher:
    build: .
    container_name: puda-watcher
    restart: unless-stopped
    network_mode: host
    environment:
      INFLUXDB_URL: http://localhost:8181
      INFLUXDB_TOKEN: apiv3_puda
      INFLUXDB_DATABASE: machines
      NATS_SERVERS: nats://100.109.131.12:4222,nats://100.109.131.12:4223,nats://100.109.131.12:4224
      MACHINES: biologic,first,opentrons
    depends_on:
      influxdb:
        condition: service_healthy

volumes:
  influxdb_data:
  grafana_data:
