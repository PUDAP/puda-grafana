[agent]
  interval = "10s"
  flush_interval = "5s"
  metric_batch_size = 1000
  metric_buffer_limit = 10000

# This machine publishes on a NATS server separate from the shared PUDA logger.
[[inputs.nats_consumer]]
  name_override = "telemetry"
  servers = ["${NATS_IMRE_PESCARDO_URL}"]
  subjects = ["puda.pescador-pipqubot.tlm.health"]
  queue_group = "puda_grafana_imre_pescardo_telemetry"
  data_format = "value"
  data_type = "string"

[[processors.starlark]]
  namepass = ["telemetry"]
  source = '''
load("json.star", "json")
load("time.star", "time")

def apply(metric):
    raw = metric.fields.get("value")
    if raw == None:
        return metric

    metric.fields["data"] = raw
    metric.fields.pop("value")

    data = json.decode(raw)
    ts = data.get("timestamp")
    if type(ts) == "string" and len(ts) > 0:
        parsed = time.parse_time(ts, format="2006-01-02T15:04:05Z07:00", location="UTC")
        metric.time = parsed.unix_nano

    return metric
'''

[[processors.regex]]
  namepass = ["telemetry"]
  [[processors.regex.tags]]
    key = "subject"
    pattern = '^puda\.([^.]+)\.tlm\.health$'
    replacement = "${1}"
    result_key = "machine_id"

[[outputs.influxdb_v2]]
  urls = ["${INFLUXDB_URL}"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORGANIZATION}"
  bucket = "${INFLUXDB_PUDA_DATABASE}"
