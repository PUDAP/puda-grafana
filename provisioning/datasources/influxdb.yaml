apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    uid: influxdb-puda
    url: http://influxdb:8181
    access: proxy
    isDefault: true
    database: $INFLUXDB_DATABASE
    jsonData:
      version: SQL
      database: $INFLUXDB_DATABASE
      insecureGrpc: true
    secureJsonData:
      token: $INFLUXDB_TOKEN
