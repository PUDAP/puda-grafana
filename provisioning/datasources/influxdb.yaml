apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    uid: influxdb-puda
    url: $INFLUXDB_URL
    access: proxy
    isDefault: true
    database: $INFLUXDB_MACHINES_DATABASE
    jsonData:
      version: SQL
      database: $INFLUXDB_MACHINES_DATABASE
      insecureGrpc: true
    secureJsonData:
      token: $INFLUXDB_TOKEN

  - name: InfluxDB Hermes
    type: influxdb
    uid: influxdb-hermes-first
    url: $INFLUXDB_URL
    access: proxy
    database: $INFLUXDB_HERMES_DATABASE
    jsonData:
      version: SQL
      database: $INFLUXDB_HERMES_DATABASE
      insecureGrpc: true
    secureJsonData:
      token: $INFLUXDB_TOKEN
