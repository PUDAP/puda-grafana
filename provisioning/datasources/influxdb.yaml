apiVersion: 1

datasources:
  - name: PUDA InfluxDB
    type: influxdb
    uid: puda-influxdb
    url: $INFLUXDB_URL
    access: proxy
    isDefault: true
    database: $INFLUXDB_PUDA_DATABASE
    jsonData:
      version: SQL
      database: $INFLUXDB_PUDA_DATABASE
      insecureGrpc: true
    secureJsonData:
      token: $INFLUXDB_TOKEN

  - name: InfluxDB Hermes
    type: influxdb
    uid: influxdb-hermes
    url: $INFLUXDB_URL
    access: proxy
    database: $INFLUXDB_HERMES_DATABASE
    jsonData:
      version: SQL
      database: $INFLUXDB_HERMES_DATABASE
      insecureGrpc: true
    secureJsonData:
      token: $INFLUXDB_TOKEN
